<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C4D Mortgage Dashboard</title>
  <!-- Color emoji font so weather icons render on Linux/Raspberry Pi (no system emoji font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Montserrat:wght@800;900&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif, "Noto Color Emoji";
      background: #2b2f33;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    /* Twemoji emoji images scale with the surrounding font-size */
    img.emoji {
      height: 1em;
      width: 1em;
      margin: 0 0.05em 0 0.05em;
      vertical-align: -0.12em;
      display: inline-block;
    }

    /* Fixed 1920x1080 design canvas, scaled to the real screen by JS.
       This renders identically on every browser/resolution (TV, Pi, laptop). */
    .dashboard {
      display: grid;
      width: 1920px;
      height: 1080px;
      padding: 8px;
      transform-origin: top left;
      gap: 8px;
      /* three columns: left, middle (wider), right */
      grid-template-columns: 1fr 1.05fr 1fr;
      /* rows: top area, bottom area, then two thin bars */
      grid-template-rows: 1fr 1.6fr 120px 120px;
      grid-template-areas:
        "s3 s1 s6"
        "s3 s1 s7"
        "s4 s4 s4"
        "s5 s5 s5";
    }

    .panel {
      background: #ffffff;
      border: 2px solid #2b2f33;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      color: #888;
      font-size: 14px;
    }

    .s1 {
      grid-area: s1;
      padding: 0;
      overflow: hidden;
      position: relative;
    }
    .s1-logo {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      /* extra bottom padding keeps the logo clear of the footer text */
      padding: 32px 38px 280px;
    }
    .logo-img {
      width: 100%;
      height: 100%;
    }
    .s1-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 22px 19px 37px;
      background: transparent;
    }
    .s1-divider {
      width: 160px;
      height: 5px;
      border-radius: 3px;
      background: linear-gradient(90deg, #f26522, #8dc63f);
      margin-bottom: 9px;
    }
    .s1-tagline {
      font-size: 37px;
      font-style: italic;
      color: #6b7785;
    }
    .s1-web {
      font-size: 54px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #f26522;
      text-decoration: none;
    }
    .s1-nmls {
      font-size: 39px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #8a96a2;
    }

    .logo {
      text-align: center;
      line-height: 1.1;
      user-select: none;
    }
    .logo .top {
      color: #f26522;
      font-weight: 700;
      font-size: clamp(20px, 4.5vw, 52px);
      letter-spacing: 0.18em;
    }
    .logo .bottom {
      color: #7d7d7d;
      font-weight: 400;
      font-size: clamp(12px, 2.6vw, 30px);
      letter-spacing: 0.35em;
      margin-top: 4px;
      padding-left: 0.35em; /* offset to balance the trailing letter-spacing */
    }
    .s3 {
      grid-area: s3;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 32px 29px;
      overflow: hidden;
    }
    .tsy-header {
      flex: 0 0 auto;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 19px;
      color: #2b2f33;
      border-bottom: 1px solid #ececec;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tsy-top {
      flex: 0 0 45%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 14px;
      text-align: center;
    }
    .tsy-title {
      font-size: 59px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #f26522;
      position: relative;
      padding-bottom: 10px;
    }
    .tsy-title::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 90px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #f26522, #8dc63f);
    }
    .tsy-number {
      font-size: 238px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.01em;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(180deg, #f26522 0%, #2b2f33 95%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 1px 1px rgba(242, 101, 34, 0.08);
    }
    .tsy-updated {
      font-size: 26px;
      color: #8a96a2;
      font-style: italic;
    }
    .tsy-bottom {
      flex: 1 1 60%;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .tsy-src {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #6b7785;
      background: #eef2f7;
      padding: 2px 7px;
      border-radius: 3px;
    }
    .tsy-widget {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }
    .s4 {
      grid-area: s4;
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      background: #111;
      border: 3px solid #ffffff;
      color: #fff;
    }
    .ticker-label {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      padding: 0 40px;
      background: #f26522;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.12em;
      font-size: 40px;
      text-transform: uppercase;
      z-index: 2;
    }
    .ticker-viewport {
      flex: 1 1 auto;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
    }
    .ticker-track {
      display: inline-flex;
      flex-wrap: nowrap;
      white-space: nowrap;
      will-change: transform;
      transform: translateZ(0);
      backface-visibility: hidden;
      animation: ticker-scroll 500s linear infinite;
    }
    .ticker-viewport:hover .ticker-track {
      animation-play-state: paused;
    }
    .ticker-item {
      display: inline-flex;
      align-items: center;
      padding: 0 70px;
      font-size: 40px;
      color: #f0f0f0;
    }
    .ticker-item::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #8dc63f;
      margin-right: 34px;
      flex: 0 0 auto;
    }
    @keyframes ticker-scroll {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(-50%, 0, 0); }
    }
    .s5 {
      grid-area: s5;
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      background: #23272b;
      border: 3px solid #ffffff;
      color: #fff;
    }
    .stock-label {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      padding: 0 40px;
      background: #6f9c2f;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.12em;
      font-size: 40px;
      text-transform: uppercase;
      z-index: 2;
    }
    .stock-viewport {
      flex: 1 1 auto;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
    }
    .stock-track {
      display: inline-flex;
      flex-wrap: nowrap;
      white-space: nowrap;
      will-change: transform;
      transform: translateZ(0);
      backface-visibility: hidden;
      animation: ticker-scroll 140s linear infinite;
    }
    .stock-viewport:hover .stock-track {
      animation-play-state: paused;
    }
    .stock-item {
      display: inline-flex;
      align-items: baseline;
      gap: 20px;
      padding: 0 55px;
      font-size: 40px;
      border-right: 1px solid rgba(255,255,255,0.12);
    }
    .stock-sym { font-weight: 700; color: #e8eef3; letter-spacing: 0.04em; }
    .stock-price { color: #cfd8e0; }
    .stock-chg { font-weight: 600; }
    .stock-chg.up   { color: #2ec26a; }
    .stock-chg.down { color: #ff5a5a; }
    .stock-chg.flat { color: #c0c0c0; }
    .s6 {
      grid-area: s6;
      flex-direction: column;
      justify-content: space-between;
      align-items: stretch;
      padding: 22px 27px;
      color: #1a2733;
      background: linear-gradient(160deg, #fdf0e6 0%, #ffffff 60%);
      text-align: left;
      overflow: hidden;
    }
    .wx-greeting {
      font-size: 29px;
      font-weight: 600;
      color: #f26522;
    }
    .wx-clock {
      font-size: 71px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.01em;
      color: #2b2f33;
      font-variant-numeric: tabular-nums;
    }
    .wx-clock .ampm {
      font-size: 0.4em;
      font-weight: 700;
      color: #7d8995;
      margin-left: 6px;
    }
    .wx-date {
      font-size: 19px;
      font-weight: 600;
      color: #3a4754;
      margin-top: 2px;
      white-space: nowrap;
    }
    .wx-mid {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }
    /* let the weather text wrap instead of overflowing the panel */
    .wx-mid > *, .wx-weather, .wx-weather > div { min-width: 0; }
    .wx-time { flex: 0 0 auto; }
    .wx-divider {
      align-self: stretch;
      flex: 0 0 auto;
      width: 2px;
      background: #cdd7e5;
      border-radius: 1px;
    }
    .wx-weather {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .wx-icon { font-size: 56px; line-height: 1; }
    .wx-temp-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .wx-temp {
      font-size: 71px;
      font-weight: 800;
      color: #2b2f33;
      line-height: 1;
      letter-spacing: 0.01em;
      font-variant-numeric: tabular-nums;
    }
    .wx-cond { font-size: 25px; font-weight: 600; color: #3a4754; }
    .wx-sub  { font-size: 18px; color: #6b7785; margin-top: 2px; }
    .wx-loc {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #9aa6b2;
    }
    .wx-forecast {
      display: flex;
      gap: 8px;
    }
    .wx-fc-day {
      flex: 1 1 0;
      background: rgba(242, 101, 34, 0.07);
      border-radius: 8px;
      padding: 4px;
      text-align: center;
      line-height: 1.15;
    }
    .wx-fc-name {
      font-size: 19px;
      font-weight: 700;
      color: #3a4754;
    }
    .wx-fc-icon { font-size: 30px; }
    .wx-fc-temp {
      font-size: 19px;
      font-weight: 700;
      color: #2b2f33;
      font-variant-numeric: tabular-nums;
    }
    .wx-fc-temp .lo { color: #8a96a2; font-weight: 500; }
    .s7 {
      grid-area: s7;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 27px 29px;
      overflow: hidden;
      background: #ffffff;
      color: #1a2733;
    }
    .cal-header {
      flex: 0 0 auto;
      padding: 12px 14px 6px 98px;
    }
    .cal-weekday {
      font-size: clamp(22px, 2.4vw, 26px);
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #f26522;
    }
    .cal-date {
      font-size: clamp(52px, 8vw, 84px);
      font-weight: 400;
      line-height: 1.05;
      color: #2b2f33;
    }
    .cal-tz {
      flex: 0 0 auto;
      font-size: 22px;
      color: #8a96a2;
      padding: 0 0 4px 12px;
    }
    .cal-grid {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .cal-hour {
      flex: 1 1 0;
      display: flex;
      min-height: 0;
      border-top: 1px solid #ececec;
    }
    .cal-time {
      flex: 0 0 90px;
      font-size: 22px;
      color: #8a96a2;
      padding: 2px 12px 0 0;
      text-align: right;
      white-space: nowrap;
    }
    .cal-cell {
      flex: 1 1 auto;
      position: relative;
      border-left: 1px solid #ececec;
    }
    .cal-event {
      position: absolute;
      inset: 3px 10px 3px 6px;
      background: #f26522;
      border-left: 3px solid #8dc63f;
      border-radius: 6px;
      padding: 4px 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(242, 101, 34, 0.25);
    }
    .cal-event-title {
      font-size: clamp(22px, 2.4vw, 28px);
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
    }
    .cal-event-time {
      font-size: clamp(20px, 2vw, 24px);
      color: #ffe0cd;
    }

    /* ----- Monthly calendar (section 7) ----- */
    .cal-m-header {
      flex: 0 0 auto;
      padding: 8px 14px 4px;
      text-align: center;
    }
    .cal-m-title {
      font-size: clamp(31px, 4.08vw, 51px);
      font-weight: 800;
      color: #2b2f33;
      letter-spacing: 0.01em;
    }
    .cal-m-weekdays {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid #e3e3e3;
    }
    .cal-m-weekdays > div {
      text-align: center;
      font-size: clamp(19px, 2.21vw, 27px);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #f26522;
      padding: 4px 0;
    }
    .cal-m-grid {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 1fr;
      min-height: 0;
    }
    .cal-m-day {
      border-top: 1px solid #ececec;
      border-left: 1px solid #ececec;
      padding: 2px 4px 0;
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .cal-m-day:nth-child(7n + 1) { border-left: 0; }
    .cal-m-num {
      font-size: clamp(22px, 2.55vw, 34px);
      font-weight: 600;
      color: #3a4754;
      line-height: 1.1;
    }
    .cal-m-other .cal-m-num { color: #c4ccd4; }
    .cal-m-today {
      background: rgba(242, 101, 34, 0.10);
    }
    .cal-m-today .cal-m-num {
      color: #f26522;
      font-weight: 800;
    }
    .cal-m-events {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }
    .cal-m-event {
      font-size: clamp(15px, 1.78vw, 22px);
      font-weight: 600;
      line-height: 1.2;
      border-radius: 3px;
      padding: 1px 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cal-m-event.meeting { background: #f26522; color: #ffffff; }
    .cal-m-event.holiday { background: #f3b21b; color: #3a2a00; }
    .cal-m-event.processing { background: #1a7f37; color: #ffffff; }
    .cal-m-event.sales { background: #6b4fa8; color: #ffffff; }

    /* ----- Today's Mortgage Rates (section 7) ----- */
    .rates-header { flex: 0 0 auto; margin-bottom: 16px; }
    .rates-title {
      font-size: 70px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #f26522;
      line-height: 1.05;
      position: relative;
      display: inline-block;
      padding-bottom: 12px;
    }
    .rates-title::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 110px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #f26522, #8dc63f);
    }
    .rates-sub {
      font-size: 28px;
      color: #8a96a2;
      margin-top: 8px;
    }
    .rates-grid {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
    }
    .rate-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-top: 1px solid #ececec;
      padding-top: 6px;
    }
    .rate-name {
      font-size: 39px;
      font-weight: 700;
      color: #6b7785;
      letter-spacing: 0.01em;
    }
    .rate-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }
    .rate-value {
      font-size: 89px;
      font-weight: 800;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(180deg, #f26522 0%, #2b2f33 95%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .rate-chg {
      font-size: 41px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .rate-chg.up { color: #c8102e; }
    .rate-chg.down { color: #1a7f37; }
    .rate-chg.unchanged { color: #8a96a2; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="panel s1">
      <div class="s1-logo">
        <svg class="logo-img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" role="img" aria-label="C4D Mortgage logo">
          <defs>
            <clipPath id="roofClip"><polygon points="180,172 280,66 380,172"/></clipPath>
            <clipPath id="baseClip"><polygon points="176,224 384,224 280,282"/></clipPath>
          </defs>
          <g fill="#8dc63f">
            <circle cx="150" cy="80" r="26"/><circle cx="126" cy="96" r="18"/>
            <circle cx="172" cy="66" r="18"/><circle cx="186" cy="90" r="14"/>
            <circle cx="410" cy="80" r="26"/><circle cx="434" cy="96" r="18"/>
            <circle cx="388" cy="66" r="18"/><circle cx="374" cy="90" r="14"/>
          </g>
          <polygon points="280,25 410,95 410,235 280,305 150,235 150,95" fill="#3d4247"/>
          <polygon points="280,38 398,102 398,228 280,292 162,228 162,102" fill="#ffffff"/>
          <polygon points="280,48 388,108 388,222 280,282 172,222 172,108" fill="#f26522"/>
          <polygon points="180,172 280,66 380,172" fill="#3d4247" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>
          <path d="M196,176 C240,128 305,102 372,122" fill="none" stroke="#f26522" stroke-width="11" clip-path="url(#roofClip)"/>
          <g fill="#ffffff">
            <rect x="252" y="102" width="9" height="11"/><rect x="264" y="102" width="9" height="11"/>
            <rect x="252" y="116" width="9" height="11"/><rect x="264" y="116" width="9" height="11"/>
            <rect x="287" y="102" width="9" height="11"/><rect x="299" y="102" width="9" height="11"/>
            <rect x="287" y="116" width="9" height="11"/><rect x="299" y="116" width="9" height="11"/>
          </g>
          <polygon points="176,224 384,224 280,282" fill="#3d4247"/>
          <path d="M220,246 Q280,226 352,236 Q288,240 232,256 Z" fill="#f26522" clip-path="url(#baseClip)"/>
          <path d="M30,156 L115,156 L115,216 L30,216 L58,186 Z" fill="#f26522"/>
          <path d="M530,156 L445,156 L445,216 L530,216 L502,186 Z" fill="#f26522"/>
          <path d="M115,156 L103,148 L115,148 Z" fill="#c94f16"/>
          <path d="M115,216 L103,224 L115,224 Z" fill="#c94f16"/>
          <path d="M445,156 L457,148 L445,148 Z" fill="#c94f16"/>
          <path d="M445,216 L457,224 L445,224 Z" fill="#c94f16"/>
          <rect x="103" y="148" width="354" height="76" fill="#f26522"/>
          <line x1="132" y1="183" x2="198" y2="183" stroke="#3d4247" stroke-width="5"/>
          <line x1="362" y1="183" x2="428" y2="183" stroke="#3d4247" stroke-width="5"/>
          <text x="280" y="201" text-anchor="middle" font-family="Montserrat, Arial, Helvetica, sans-serif" font-size="56" font-weight="900" letter-spacing="2" fill="#3d4247">C4D</text>
          <text x="283" y="219" text-anchor="middle" font-family="Montserrat, Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="7" fill="#3d4247">MORTGAGE</text>
        </svg>
      </div>
      <div class="s1-footer">
        <div class="s1-divider"></div>
        <div class="s1-tagline">Your trusted path home 🏡</div>
        <a class="s1-web" href="https://www.c4dmortgage.com/" target="_blank" rel="noopener">c4dmortgage.com</a>
        <div class="s1-nmls">NMLS #151261</div>
      </div>
    </div>
    <div class="panel s3">
      <div class="tsy-top">
        <div class="tsy-title">The 10-Year Treasury</div>
        <div class="tsy-number" id="tsyNumber">—</div>

  <script>
    // ----- Scale the fixed 1920x1080 canvas to fill the actual screen -----
    function fitDashboard() {
      const el = document.querySelector('.dashboard');
      if (!el) return;
      el.style.transform = 'scale(' + (window.innerWidth / 1920) + ', ' + (window.innerHeight / 1080) + ')';
    }
    fitDashboard();
    window.addEventListener('resize', fitDashboard);

    // ----- Emoji as images (consistent on Raspberry Pi) -----
    function twemojify(el) {
      if (window.twemoji && el) {
        window.twemoji.parse(el, {
          base: "https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/",
          folder: "svg",
          ext: ".svg"
        });
      }

    // ----- Auto-reload (keeps a long-running TV kiosk fresh) -----
    // Reloads the whole page every 60 minutes to clear any memory drift.
    setTimeout(function () { location.reload(); }, 60 * 60 * 1000);

    // ----- 10-Year Treasury number (section 3 top) — CNBC via Netlify function -----
    const TSY_TZ = "America/Detroit";
    function treasuryUpdatedStamp() {
      const now = new Date();
      const d = new Intl.DateTimeFormat("en-US", {
        timeZone: TSY_TZ, month: "short", day: "numeric", year: "numeric"
      }).format(now);
      const t = new Intl.DateTimeFormat("en-US", {
        timeZone: TSY_TZ, hour: "numeric", minute: "2-digit", hour12: true
      }).format(now);
      return "Last updated " + d + " · " + t;

        const res = await fetch('/.netlify/functions/treasury', { cache: 'no-store' });

        const d = await res.json();
        if (d && d.last) {
          document.getElementById('tsyNumber').textContent = d.last;
          document.getElementById('tsyUpdated').textContent = treasuryUpdatedStamp();

      }

    // ----- 10-Year Treasury chart (section 3 bottom) — live ^TNX via Netlify function -----

        handleScale: false

      });

        try {
          const res = await fetch('/.netlify/functions/tnx', { cache: 'no-store' });

          const d = await res.json();

            series.setData(d.series);
            chart.timeScale().fitContent();
          }

          // keep whatever is shown if a refresh fails
        }

    initTreasuryChart();

    // ----- News ticker -----
    // Real headlines pulled June 23, 2026 (used as the offline fallback).
    const FALLBACK_HEADLINES = [
      "30-year fixed mortgage rate rises to 6.63% as of June 23, 2026",
      "Fed's hawkish tone pushes mortgage rates upward after June meeting",
      "May CPI shows inflation at 4.2% annually — highest pace in over three years",
      "Fannie Mae and MBA predict rates stay in the low-to-mid 6% range through 2027",

      "30-year jumbo loan rate eases to 6.48%",

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));

      // Combined headlines from all chosen feeds, served by our Netlify function.
      try {
        const res = await fetch('/.netlify/functions/news', { cache: 'no-store' });
        if (!res.ok) throw new Error('bad status');
        const data = await res.json();
        if (data.headlines && data.headlines.length) return data.headlines;
      } catch (e) {
        // fall back to the static list below
      }
      return null;
    }

    async function initTicker() {
      renderTicker(FALLBACK_HEADLINES); // show something immediately

    // ----- Stock ticker (live from Finnhub — finnhub.io) -----
    // Finnhub allows direct browser calls (CORS *), so no flaky proxy is needed.
    // Get a FREE key at https://finnhub.io/register and paste it below.
    const FINNHUB_KEY = "d8tul51r01qinhuel2ngd8tul51r01qinhuel2o0";

    // Stocks via Finnhub (free tier). Major indices come from the Netlify

    function fmtPrice(p) {
      if (p >= 1000) return p.toLocaleString(undefined, { maximumFractionDigits: 2 });
      return p.toFixed(2);
    }

    function renderStocks(quotes) {
      const track = document.getElementById('stockTrack');
      const html = quotes.map(q => {
        const dir = q.chgPct > 0.001 ? 'up' : (q.chgPct < -0.001 ? 'down' : 'flat');
        const arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '▬');
        const sign = q.chgPct > 0 ? '+' : '';
        return '<span class="stock-item">' +
                 '<span class="stock-sym">' + escapeHtml(q.label) + '</span>' +
                 '<span class="stock-price">' + fmtPrice(q.price) + '</span>' +
                 '<span class="stock-chg ' + dir + '">' + arrow + ' ' + sign + q.chgPct.toFixed(2) + '%</span>' +
               '</span>';
      }).join('');
      track.innerHTML = html + html; // duplicate for seamless loop

    async function fetchOneQuote(item) {
      const url = "https://finnhub.io/api/v1/quote?symbol=" +
                  encodeURIComponent(item.sym) + "&token=" + FINNHUB_KEY;
      const res = await fetch(url);
      if (!res.ok) throw new Error("bad status");
      const d = await res.json();
      // Finnhub: c = current price, dp = percent change, pc = previous close.
      if (typeof d.c !== "number" || d.c === 0) throw new Error("no price");
      return { label: item.label, price: d.c, chgPct: (typeof d.dp === "number" ? d.dp : 0) };
    }

    async function fetchOneMetal(m) {
      // Spot price (per oz) from gold-api.com — keyless and CORS-enabled.
      const res = await fetch("https://api.gold-api.com/price/" + m.spot);
      if (!res.ok) throw new Error("metal bad status");
      const d = await res.json();
      if (typeof d.price !== "number") throw new Error("no price");
      // Daily % change proxied by the metal's ETF (close tracker); 0 if unavailable.
      let chgPct = 0;
      if (FINNHUB_KEY && FINNHUB_KEY !== "YOUR_FINNHUB_API_KEY") {
        try { chgPct = (await fetchOneQuote({ sym: m.etf, label: m.label })).chgPct; }
        catch (_) { /* keep 0 */ }
      }
      return { label: m.label, price: d.price, chgPct };
    }

    async function fetchIndices() {
      // Real S&P 500 / Dow / Nasdaq levels from our Netlify function.
      const res = await fetch('/.netlify/functions/indices', { cache: 'no-store' });
      if (!res.ok) throw new Error('indices bad status');
      const d = await res.json();
      return (d.quotes || []).filter(q => isFinite(q.price));
    }

    async function fetchBitcoin() {
      // Bitcoin spot + 24h change from CoinGecko (keyless, CORS-enabled).
      const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true");
      if (!res.ok) throw new Error("btc bad status");
      const d = await res.json();
      const b = d.bitcoin;
      if (!b || typeof b.usd !== "number") throw new Error("no price");
      return { label: "BTC", price: b.usd, chgPct: (typeof b.usd_24h_change === "number" ? b.usd_24h_change : 0) };
    }

    async function fetchLiveQuotes() {
      const stockJobs = (FINNHUB_KEY && FINNHUB_KEY !== "YOUR_FINNHUB_API_KEY")
        ? SYMBOLS.map(fetchOneQuote) : [];
      const metalJobs = METALS.map(fetchOneMetal);
      const [indices, results] = await Promise.all([
        fetchIndices().catch(() => []),                 // indices first; empty if it fails
        Promise.allSettled([...stockJobs, ...metalJobs, fetchBitcoin()])
      ]);
      const rest = results
        .filter(r => r.status === 'fulfilled' && isFinite(r.value.price))
        .map(r => r.value);
      const ok = [...indices, ...rest];
      // Show whatever we got, as long as it's a reasonable set.
      return ok.length >= METALS.length ? ok : null;
    }

    async function initStocks() {
      renderStocks(FALLBACK_QUOTES); // immediate
      const live = await fetchLiveQuotes();
      if (live) renderStocks(live);
    }

    initStocks();
    // Refresh quotes every 60 seconds.
    setInterval(async () => {
      const live = await fetchLiveQuotes();
      if (live) renderStocks(live);
    }, 60 * 1000);

    // ----- Date / Time / Weather for Troy, MI (with flavor) -----
    const TROY = { lat: 42.6056, lon: -83.1499, tz: "America/Detroit" };

    // Map WMO weather codes -> { icon, text }
    function describeWeather(code, isDay) {
      const sun = isDay ? "☀️" : "🌙";
      const map = {
        0:  [sun, "Clear skies"],
        1:  [isDay ? "🌤️" : "🌙", "Mostly clear"],
        2:  ["⛅", "Partly cloudy"],
        3:  ["☁️", "Overcast"],
        45: ["🌫️", "Foggy"],
        48: ["🌫️", "Freezing fog"],
        51: ["🌦️", "Light drizzle"],
        53: ["🌦️", "Drizzle"],
        55: ["🌧️", "Heavy drizzle"],
        56: ["🌧️", "Freezing drizzle"],
        57: ["🌧️", "Freezing drizzle"],
        61: ["🌦️", "Light rain"],
        63: ["🌧️", "Rain"],
        65: ["🌧️", "Heavy rain"],
        66: ["🌧️", "Freezing rain"],
        67: ["🌧️", "Freezing rain"],
        71: ["🌨️", "Light snow"],
        73: ["🌨️", "Snow"],
        75: ["❄️", "Heavy snow"],
        77: ["🌨️", "Snow grains"],
        80: ["🌦️", "Rain showers"],
        81: ["🌧️", "Rain showers"],
        82: ["⛈️", "Violent showers"],
        85: ["🌨️", "Snow showers"],
        86: ["❄️", "Heavy snow showers"],
        95: ["⛈️", "Thunderstorm"],
        96: ["⛈️", "Storm w/ hail"],
        99: ["⛈️", "Storm w/ hail"]
      };
      return map[code] || ["🌡️", "Michigan weather"];
    }

    // Time-of-day greeting with local flavor.
    function greetingFor(hour) {
      if (hour < 5)  return "Burning the midnight oil, Troy";
      if (hour < 12) return "Good morning, Troy";
      if (hour < 17) return "Good afternoon, Troy";
      if (hour < 21) return "Good evening, Troy";
      return "Late night in the Big Beaver";
    }

    // Short weekday name from an "YYYY-MM-DD" string (built at local noon to avoid TZ drift).
    function shortDayName(iso) {
      const p = iso.split('-').map(Number);
      const dt = new Date(p[0], p[1] - 1, p[2], 12);
      return ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][dt.getDay()];
    }

    function getTroyParts() {
      // Build a Date in Troy's timezone using Intl.
      const now = new Date();
      const fmt = new Intl.DateTimeFormat("en-US", {
        timeZone: TROY.tz, hour: "numeric", minute: "2-digit",
        hour12: true, weekday: "long", month: "long", day: "numeric", year: "numeric"
      });
      const parts = {};
      for (const p of fmt.formatToParts(now)) parts[p.type] = p.value;
      const hour24 = parseInt(new Intl.DateTimeFormat("en-US", {
        timeZone: TROY.tz, hour: "numeric", hour12: false
      }).format(now), 10) % 24;
      return { parts, hour24 };
    }

    function tickClock() {
      const { parts, hour24 } = getTroyParts();
      document.getElementById('wxClock').innerHTML =
        parts.hour + ":" + parts.minute +
        '<span class="ampm">' + (parts.dayPeriod || '') + '</span>';
      document.getElementById('wxDate').textContent =
        parts.weekday + ", " + parts.month + " " + parts.day + ", " + parts.year;
      document.getElementById('wxGreeting').textContent = greetingFor(hour24);
    }

    async function fetchWeather() {
      try {
        const url = "https://api.open-meteo.com/v1/forecast?latitude=" + TROY.lat +
          "&longitude=" + TROY.lon +
          "&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,is_day,weather_code" +
          "&daily=weather_code,temperature_2m_max,temperature_2m_min&forecast_days=4" +
          "&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=" + encodeURIComponent(TROY.tz);
        const res = await fetch(url);
        if (!res.ok) throw new Error("weather fetch failed");
        const data = await res.json();
        const c = data.current;
        const isDay = c.is_day === 1;
        const [icon, text] = describeWeather(c.weather_code, isDay);
        document.getElementById('wxIcon').textContent = icon;
        document.getElementById('wxTemp').textContent = Math.round(c.temperature_2m) + "°";
        document.getElementById('wxCond').textContent = text;
        document.getElementById('wxSub').textContent =
          "Feels like " + Math.round(c.apparent_temperature) + "° · " +
          c.relative_humidity_2m + "% humidity · " +
          Math.round(c.wind_speed_10m) + " mph wind";

        // Next 3 days (indices 1..3; index 0 is today)
        if (data.daily && data.daily.time) {
          const d = data.daily;
          let fc = '';
          for (let i = 1; i <= 3 && i < d.time.length; i++) {
            const [ic] = describeWeather(d.weather_code[i], true);
            fc += '<div class="wx-fc-day">' +
              '<div class="wx-fc-name">' + shortDayName(d.time[i]) + '</div>' +
              '<div class="wx-fc-icon">' + ic + '</div>' +
              '<div class="wx-fc-temp">' + Math.round(d.temperature_2m_max[i]) + '°' +
                ' <span class="lo">' + Math.round(d.temperature_2m_min[i]) + '°</span></div>' +
              '</div>';
          }
          document.getElementById('wxForecast').innerHTML = fc;
        }
        twemojify(document.querySelector('.s6'));   // render the weather emoji as images
      } catch (e) {
        document.getElementById('wxCond').textContent = "Weather unavailable right now";
        document.getElementById('wxSub').textContent = "Couldn't reach the weather service.";
        twemojify(document.querySelector('.s6'));
      }
    }

    /* ----- OLD Day calendar (section 7) — commented out, kept so it can be restored -----
    // Single recurring event: Weekly Meeting, Wednesdays 9–10 AM.
    const CAL_START_HOUR = 8;   // 8 AM
    const CAL_END_HOUR = 18;    // 6 PM

    function hourLabel(h) {
      const ampm = h < 12 ? "AM" : "PM";
      let hh = h % 12; if (hh === 0) hh = 12;
      return hh + " " + ampm;
    }

    function troyOffsetLabel() {
      try {
        const parts = new Intl.DateTimeFormat("en-US", {
          timeZone: TROY.tz, timeZoneName: "longOffset"
        }).formatToParts(new Date());
        const v = (parts.find(p => p.type === "timeZoneName") || {}).value || "GMT-04:00";
        return v.replace(":00", "");
      } catch (e) {
        return "GMT-04";
      }
    }

    function renderCalendar() {
      const now = new Date();
      const wdShort = new Intl.DateTimeFormat("en-US", { timeZone: TROY.tz, weekday: "short" }).format(now);
      const dayNum  = new Intl.DateTimeFormat("en-US", { timeZone: TROY.tz, day: "numeric" }).format(now);
      document.getElementById('calWeekday').textContent = wdShort.toUpperCase();
      document.getElementById('calDate').textContent = dayNum;
      document.getElementById('calTz').textContent = troyOffsetLabel();
      const isWednesday = wdShort === "Wed";
      let rows = "";
      for (let h = CAL_START_HOUR; h <= CAL_END_HOUR; h++) {
        let inner = "";
        if (isWednesday && h === 9) {
          inner = '<div class="cal-event"><div class="cal-event-title">Weekly Meeting</div>' +
                  '<div class="cal-event-time">9 - 10 AM</div></div>';
        }
        rows += '<div class="cal-hour"><div class="cal-time">' + hourLabel(h) + '</div>' +
                '<div class="cal-cell">' + inner + '</div></div>';
      }
      document.getElementById('calGrid').innerHTML = rows;
    }
    renderCalendar();
    setInterval(renderCalendar, 60 * 1000);
    ----- end old day calendar ----- */

    // ----- Monthly calendar (section 7) -----
    // Wednesdays show the recurring Weekly Meeting; major holidays are computed
    // for any month/year, so it works forever with no hardcoded dates.
    const CAL_TZ = "America/Detroit";

    function nthWeekday(year, month, weekday, n) {        // month 0-11, weekday 0=Sun
      const first = new Date(year, month, 1);
      const offset = (weekday - first.getDay() + 7) % 7;
      return new Date(year, month, 1 + offset + (n - 1) * 7);
    }
    function lastWeekday(year, month, weekday) {
      const last = new Date(year, month + 1, 0);
      const offset = (last.getDay() - weekday + 7) % 7;
      return new Date(year, month, last.getDate() - offset);
    }
    function easterSunday(year) {                          // Anonymous Gregorian algorithm
      const a = year % 19, b = Math.floor(year / 100), c = year % 100;
      const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
      const g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
      const i = Math.floor(c / 4), k = c % 4;
      const l = (32 + 2 * e + 2 * i - h - k) % 7;
      const m = Math.floor((a + 11 * h + 22 * l) / 451);
      const mon = Math.floor((h + l - 7 * m + 114) / 31);  // 3=Mar, 4=Apr
      const day = ((h + l - 7 * m + 114) % 31) + 1;
      return new Date(year, mon - 1, day);
    }

    // Build { dayNumber: [names] } of major holidays for the given year/month (0-11).
    function holidaysForMonth(year, month) {
      const out = {};
      const add = (date, name) => {
        if (date.getFullYear() === year && date.getMonth() === month) {
          (out[date.getDate()] = out[date.getDate()] || []).push(name);
        }
      };
      // Fixed dates
      add(new Date(year, 0, 1),   "New Year's Day");
      add(new Date(year, 1, 14),  "Valentine's Day");
      add(new Date(year, 2, 17),  "St. Patrick's Day");
      add(new Date(year, 4, 5),   "Cinco de Mayo");
      add(new Date(year, 5, 19),  "Juneteenth");
      add(new Date(year, 6, 4),   "Independence Day");
      add(new Date(year, 9, 31),  "Halloween");
      add(new Date(year, 10, 11), "Veterans Day");
      add(new Date(year, 11, 24), "Christmas Eve");
      add(new Date(year, 11, 25), "Christmas");
      add(new Date(year, 11, 31), "New Year's Eve");
      // Floating dates
      add(nthWeekday(year, 0, 1, 3),  "MLK Day");          // 3rd Mon Jan
      add(nthWeekday(year, 1, 1, 3),  "Presidents' Day");  // 3rd Mon Feb
      add(lastWeekday(year, 4, 1),    "Memorial Day");     // last Mon May
      add(nthWeekday(year, 4, 0, 2),  "Mother's Day");     // 2nd Sun May
      add(nthWeekday(year, 5, 0, 3),  "Father's Day");     // 3rd Sun Jun
      add(nthWeekday(year, 8, 1, 1),  "Labor Day");        // 1st Mon Sep
      add(nthWeekday(year, 9, 1, 2),  "Columbus Day");     // 2nd Mon Oct
      add(nthWeekday(year, 10, 4, 4), "Thanksgiving");     // 4th Thu Nov
      // Easter and Good Friday
      const es = easterSunday(year);
      add(es, "Easter");
      add(new Date(es.getFullYear(), es.getMonth(), es.getDate() - 2), "Good Friday");
      return out;
    }

    function renderMonthCalendar() {
      const now = new Date();
      const year  = parseInt(new Intl.DateTimeFormat("en-US", { timeZone: CAL_TZ, year: "numeric" }).format(now), 10);
      const month = parseInt(new Intl.DateTimeFormat("en-US", { timeZone: CAL_TZ, month: "numeric" }).format(now), 10) - 1;
      const today = parseInt(new Intl.DateTimeFormat("en-US", { timeZone: CAL_TZ, day: "numeric" }).format(now), 10);

      document.getElementById('calMTitle').textContent =
        "C4D Events - " +
        new Date(year, month, 1).toLocaleDateString("en-US", { month: "long", year: "numeric" });

      const holidays = holidaysForMonth(year, month);
      const firstDow = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevDays = new Date(year, month, 0).getDate();
      const totalCells = Math.ceil((firstDow + daysInMonth) / 7) * 7;

      let cells = "";
      for (let i = 0; i < totalCells; i++) {
        const dayNum = i - firstDow + 1;
        let cls = "cal-m-day", num, events = "";
        if (dayNum < 1) {
          cls += " cal-m-other"; num = prevDays + dayNum;
        } else if (dayNum > daysInMonth) {
          cls += " cal-m-other"; num = dayNum - daysInMonth;
        } else {
          num = dayNum;
          const dow = new Date(year, month, dayNum).getDay();
          const isHoliday = !!holidays[dayNum];
          if (dayNum === today) cls += " cal-m-today";

          // Holiday chips first
          (holidays[dayNum] || []).forEach(n => {
            events += '<div class="cal-m-event holiday">' + n + '</div>';
          });

          // Recurring work events on non-holiday weekdays (Mon-Fri), in time order
          if (!isHoliday && dow >= 1 && dow <= 5) {
            if (dow === 3) events += '<div class="cal-m-event meeting">9a Weekly Meeting</div>';
            events += '<div class="cal-m-event processing">11a Processing Preapproval Support</div>';
            events += '<div class="cal-m-event sales">2p LO Sales Support</div>';
          }
        }
        cells += '<div class="' + cls + '"><div class="cal-m-num">' + num + '</div>' +
                 '<div class="cal-m-events">' + events + '</div></div>';
      }
      document.getElementById('calMGrid').innerHTML = cells;
    }

    // Calendar replaced by Today's Mortgage Rates — re-enable these to restore it:
    // renderMonthCalendar();
    // setInterval(renderMonthCalendar, 60 * 1000);

    // ----- Today's Mortgage Rates (section 7) — MND via Netlify function -----
    function renderRates(rates) {
      const grid = document.getElementById('ratesGrid');
      if (!grid) return;
      grid.innerHTML = rates.map(r => {
        const dir = (r.dir === 'up' || r.dir === 'down') ? r.dir : 'unchanged';
        const arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '');
        return '<div class="rate-card">' +
                 '<div class="rate-name">' + escapeHtml(r.name) + '</div>' +
                 '<div class="rate-row">' +
                   '<span class="rate-value">' + escapeHtml(r.rate) + '</span>' +
                   '<span class="rate-chg ' + dir + '">' + arrow + ' ' + escapeHtml(r.change) + '</span>' +
                 '</div>' +
               '</div>';
      }).join('');
    }

    async function fetchRates() {
      try {
        const res = await fetch('/.netlify/functions/rates', { cache: 'no-store' });
        if (!res.ok) throw new Error('bad status');
        const d = await res.json();
        if (d.rates && d.rates.length) renderRates(d.rates);
      } catch (e) {
        // keep whatever is shown if a refresh fails
      }
    }
    fetchRates();
    setInterval(fetchRates, 30 * 60 * 1000);   // refresh every 30 minutes

    tickClock();
    setInterval(tickClock, 1000);        // clock ticks every second
    fetchWeather();
    setInterval(fetchWeather, 10 * 60 * 1000); // weather refresh every 10 min

    // Convert any static emoji already on the page (logo footer, placeholders) to images.
    twemojify(document.body);
  </script>
